<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>9hoch9 · QI/IQQ/OCTA · Hyperraum · Cube-Mind</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
.navCell { display:inline-block; width:60px; text-align:center; margin:2px; }

.cube {
  width: 150px; height: 150px;
  position: relative; margin: 40px auto;
  transform-style: preserve-3d;
  animation: spin 3s infinite linear;
}
.face {
  position: absolute; width: 150px; height: 150px;
  background:#111; border:2px solid #6cf;
  text-align:center; padding-top:40px; font-size:14px;
}
.front  { transform: translateZ(75px); }
.back   { transform: rotateY(180deg) translateZ(75px); }
.left   { transform: rotateY(-90deg) translateZ(75px); }
.right  { transform: rotateY(90deg) translateZ(75px); }
.top    { transform: rotateX(90deg) translateZ(75px); }
.bottom { transform: rotateX(-90deg) translateZ(75px); }

@keyframes spin {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(360deg); }
}
</style>

</head>

</script>
